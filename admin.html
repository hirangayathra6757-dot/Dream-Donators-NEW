<script type="module">

import { auth, db } from "./firebase.js";

import { 
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


document.addEventListener("DOMContentLoaded", () => {

let current = {};

// unlock editor
function unlock(){
document.getElementById("editor").style.display = "block";
}


// LOGIN BUTTON
document.getElementById("loginBtn").onclick = async () => {

const email = prompt("Enter admin email");
const password = document.getElementById("pw").value;

try{

await signInWithEmailAndPassword(auth,email,password);

document.getElementById("loginMsg").textContent = "Login successful";

unlock();

loadFromFirebase();

}catch(e){

document.getElementById("loginMsg").textContent = "Login failed";

}

};


// AUTO LOGIN
onAuthStateChanged(auth,(user)=>{

if(user){

unlock();
loadFromFirebase();

}

});


// LOAD DATA FROM FIREBASE
async function loadFromFirebase(){

const docRef = doc(db,"siteContent","main");
const snap = await getDoc(docRef);

if(snap.exists()){

fillEditor(snap.data());

}

}


// FILL EDITOR
function fillEditor(data){

current = data;

document.getElementById("heroTitle").value = data.hero?.title || "";
document.getElementById("heroSubtitle").value = data.hero?.subtitle || "";

document.getElementById("cAddress").value = data.contact?.address || "";
document.getElementById("cPhone").value = data.contact?.phone || "";
document.getElementById("cEmail").value = data.contact?.email || "";

document.getElementById("waLink").value = data.social?.whatsappChannel || "";
document.getElementById("fbPage").value = data.social?.facebookPage || "";

}


// SAVE BUTTON
document.getElementById("saveBtn").onclick = async () => {

current.hero = {
title: document.getElementById("heroTitle").value,
subtitle: document.getElementById("heroSubtitle").value
};

current.contact = {
address: document.getElementById("cAddress").value,
phone: document.getElementById("cPhone").value,
email: document.getElementById("cEmail").value
};

current.social = {
whatsappChannel: document.getElementById("waLink").value,
facebookPage: document.getElementById("fbPage").value,
facebookAlbums: []
};

await setDoc(doc(db,"siteContent","main"), current);

alert("Website updated successfully");

};


// RESET BUTTON
document.getElementById("resetBtn").onclick = () => {

alert("Reset done. Reload home page.");

};


});

</script>
