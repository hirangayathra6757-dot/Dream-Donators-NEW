
<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="loginBox">
<h2>Admin Login</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none">

<h2>Hero Section</h2>

<input id="heroTitleInput" placeholder="Hero Title">
<input id="heroSubtitleInput" placeholder="Hero Subtitle">

<input id="whatsappInput" placeholder="WhatsApp link">
<input id="facebookInput" placeholder="Facebook link">

<button onclick="saveMain()">Save</button>

<h2>Add Event</h2>

<input id="eventTitle" placeholder="title">
<input id="eventDate" placeholder="date">
<input id="eventLocation" placeholder="location">

<textarea id="eventDesc" placeholder="description"></textarea>

<button onclick="addEvent()">Add Event</button>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
